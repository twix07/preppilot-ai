services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: preppilot-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: preppilot-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render auto-generates a secure random value
      - key: ALLOW_DEV_LOGIN
        value: "true"                # keep true so demo@preppilot.ai works without Google OAuth
      - key: FRONTEND_ORIGIN
        value: "https://preppilot-ai-blond.vercel.app"
      - key: ANTHROPIC_API_KEY
        sync: false                  # leave empty for free mock mode, or paste your key
      - key: LLM_MODEL
        value: claude-sonnet-5
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: LANGCHAIN_TRACING_V2
        value: "false"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
databases:
  - name: preppilot-db
    plan: free                       # free tier; Render auto-manages backups
    databaseName: preppilot
    user: preppilot
