name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
      - name: Lint
        working-directory: backend
        run: ruff check app tests
      - name: Tests (mock LLM, SQLite)
        working-directory: backend
        env:
          ANTHROPIC_API_KEY: ""
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend
        working-directory: frontend
        run: npm install
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t preppilot-backend ./backend
      - name: Build frontend image
        run: docker build -t preppilot-frontend ./frontend
    # Deploy step (Azure App Service) runs on main only — configure AZURE_* secrets.
    # - uses: azure/webapps-deploy@v3 with publish-profile + images.
