services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: preppilot
      POSTGRES_PASSWORD: preppilot
      POSTGRES_DB: preppilot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U preppilot"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://preppilot:preppilot@db:5432/preppilot
      JWT_SECRET: dev-secret-change-me
      ALLOW_DEV_LOGIN: "true"
      ENVIRONMENT: development
      FRONTEND_ORIGIN: http://localhost:3000
      # Leave ANTHROPIC_API_KEY empty to run the deterministic mock (free demo),
      # or set it to use live Claude via LiteLLM.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-5}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
